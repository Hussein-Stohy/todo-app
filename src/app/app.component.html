<div class="container" (keydown)="onKeyDown($event)">
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <h1>My Tasks</h1>
      <div class="task-counter" *ngIf="totalTasksCount > 0">
        <span class="counter-text">{{ pendingTasksCount }} of {{ totalTasksCount }} tasks</span>
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="(completedTasksCount / totalTasksCount) * 100"></div>
        </div>
      </div>
    </div>
    <button class="theme-switcher" (click)="toggleTheme()" [class.dark-mode]="isDarkMode"
      [title]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'"></button>
  </header>

  <!-- Add Task Section -->
  <div class="add-task-container">
    <input type="text" placeholder="Add a new task… (Ctrl+K to focus)" class="task-input" [(ngModel)]="newTaskTitle"
      (keyup.enter)="addTask()" maxlength="100" autocomplete="off">
    <button class="add-task-btn" (click)="addTask()" [disabled]="!newTaskTitle.trim()"
      [title]="newTaskTitle.trim() ? 'Add task' : 'Enter a task title'">+</button>
  </div>

  <!-- Tasks List -->
  <main class="tasks-list">
    <div *ngFor="let task of tasks; trackBy: trackByTaskId" class="task-card"
      [ngClass]="{ 'completed': task.completed }">
      <label class="checkbox-container" [title]="task.completed ? 'Mark as incomplete' : 'Mark as complete'">
        <input type="checkbox" [checked]="task.completed" (change)="toggleTaskCompletion(task)">
        <span class="checkmark"></span>
      </label>
      <div class="task-details">
        <p class="task-title">{{ task.title }}</p>
        <small class="task-meta" *ngIf="task.createdAt">
          {{ getRelativeTime(task.createdAt) }}
        </small>
      </div>
      <button class="delete-btn" (click)="deleteTask(task.id)" [title]="'Delete: ' + task.title">×</button>
    </div>

    <!-- Empty State -->
    <div *ngIf="tasks.length === 0" class="empty-state">
      <div class="empty-icon">📋</div>
      <p>No tasks yet. Add one to get started!</p>
      <small>Press Ctrl+K to quickly add a task</small>
    </div>
  </main>

  <!-- Quick Stats (only show if there are tasks) -->
  <footer class="stats" *ngIf="totalTasksCount > 0">
    <div class="stat-item">
      <span class="stat-number">{{ pendingTasksCount }}</span>
      <span class="stat-label">Pending</span>
    </div>
    <div class="stat-item">
      <span class="stat-number">{{ completedTasksCount }}</span>
      <span class="stat-label">Completed</span>
    </div>
    <div class="stat-item">
      <span class="stat-number">{{ totalTasksCount }}</span>
      <span class="stat-label">Total</span>
    </div>
  </footer>

</div>
